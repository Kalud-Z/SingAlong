    <span> Along</span>

<div class="searchBoxContainer  searchBoxContainer-header">


    <input type="text" class="searchBox" placeholder="search for songs .." #searchInput (input)="typingSearchQuery(searchInput)" 
    (keyup.enter)="onSearch(searchInput) ;  searchInput.blur()"> 

    <div class="searchLogo" (click)='onSearch(searchInput) ;  searchInput.blur()'  >
        <svg class="searchLogo__logo"  *ngIf='!(lyricsStillLoading || videoStillLoading)' > <use xlink:href="/assets/symbol-defs.svg#icon-music-playlist"></use> </svg>
        
        <img class="loadingLogo"  *ngIf='lyricsStillLoading || videoStillLoading' src="/assets/loadingSpinners/svg-loaders/audio.svg"/>

    </div>

</div>
