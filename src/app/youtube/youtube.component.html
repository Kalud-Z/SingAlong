<!-- <button (click)='pp()' > pause</button> -->


<div class="searchBoxContainer  searchBoxContainer-video"   *ngIf='!isLyricsFullScreen'>

    <input type="text" (focus)='onFocus_SearchInput($event)' (blur)='onBlur_SearchInput($event)'  class="searchBox" placeholder="search for music videos .." #searchInput 
    (keyup.enter)="onSearch(searchInput); searchInput.blur()" [value]="searchQuery"> 

    <div class="searchLogo" (click)='onSearch(searchInput); searchInput.blur()'  >
        <svg class="searchLogo__logo" *ngIf='!isLoading' > <use xlink:href="/assets/symbol-defs.svg#icon-film"></use> </svg>
        <img class="loadingLogo"  *ngIf='isLoading' src="/assets/loadingSpinners/svg-loaders/audio.svg"/>

    </div>

</div>
 


<ul class="videosSuggestions" *ngIf="showSuggestions"   [@displayVideoSuggestionsState]='allSuggestions.length' >

    <li class="videosSuggestions__suggestion" *ngFor="let sugg of allSuggestions" (click)="onSelectVideo(sugg)" >
        <figure class="videosSuggestions__suggestion__imgWrapper"> <img  [src]="[sugg.thumbnail]"> </figure>
        <p class="videosSuggestions__suggestion__title"   > {{ sugg.title }} </p>
    </li>

</ul> 

<!-- <div class="iframeOuterContainer"></div> -->

<div class="iframeWrapper"  #videoPlayer  [ngClass]="{'iframeWrapper-small' : isLyricsFullScreen ,
                                                    'iframeWrapper-hide' : !showVideoFrame , 'iframeWrapper-onTheSide' : setVideoOnTheSide }" >
    <svg class="exitVideoButton"  @exitLogoState  *ngIf='showVideoFrame && !isLyricsFullScreen'  (click)="returnToVideos()" > <use xlink:href="/assets/symbol-defs.svg#icon-x-square"></use> </svg>
            
    <div class="iframeWrapper__videoPlayer">
        <div id='player'></div>
        <div class="iframeWrapper__videoPlayer__shield"></div>
    </div>


    <div class="controlButtonsContainer">
        <svg class="controlButton controlButton-backward"(click)='jumpBackward()' > <use xlink:href="/assets/symbol-defs.svg#icon-backward"></use> </svg>
        <svg class="controlButton controlButton-play"    (click)='playVideo()'  *ngIf='videoState === 1'> <use xlink:href="/assets/symbol-defs.svg#icon-play"></use> </svg>
        <svg class="controlButton controlButton-pause"   (click)='pauseVideo()' *ngIf='videoState === 2' > <use xlink:href="/assets/symbol-defs.svg#icon-pause"></use> </svg>
        <svg class="controlButton controlButton-forward" (click)='jumpForward()'> <use xlink:href="/assets/symbol-defs.svg#icon-forward"></use> </svg>
    </div>
</div> 
<div class="heightFixer" #heightFixer></div>
